name: fit24app
description: Step Count App
publish_to: 'none'
version: 1.2.4+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Health Connect — for 30 day history (same as Sweatcoin)
  health: ^13.3.1

  # Permissions
  permission_handler: ^11.3.1

  # State
  flutter_riverpod: ^2.5.1

  # Storage
  shared_preferences: ^2.2.3

  # HTTP
  http: ^1.2.0

  # Utils
  intl: ^0.19.0

  # GPS Tracking
  geolocator: ^12.0.0
  google_maps_flutter: ^2.7.0
  flutter_polyline_points: ^2.1.0
  latlong2: ^0.9.1

  # Video Support
  video_player: ^2.8.1

  # AI Voice Feedback
  flutter_tts: ^4.0.2

  # Image Picker
  image_picker: ^1.1.0
  wakelock_plus: ^1.5.2
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  country_picker: ^2.0.27
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/images/
    - assets/videos/

flutter_launcher_icons:
  # Android
  android: true
  image_path_android: "assets/logo.png"
  adaptive_icon_background: "#0A0D0F"   # kBg — matches app dark bg
  adaptive_icon_foreground: "assets/logo.png"

  # iOS
  ios: true
  image_path_ios: "assets/logo.png"
  remove_alpha_ios: true               # App Store requires no alpha on iOS icons

  # Web (PWA)
  web:
    generate: true
    image_path: "assets/logo.png"
    background_color: "#0A0D0F"
    theme_color: "#2ECC71"             # kGreen